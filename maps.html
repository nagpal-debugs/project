<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SENTINEL — Live Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root {
      --bg-dark: #030b14;
      --bg-panel: #071525;
      --bg-card: #0a1e33;
      --blue-primary: #0d6efd;
      --blue-bright: #3d9bff;
      --blue-accent: #00c8ff;
      --red-alert: #ff3b3b;
      --green-ok: #00e676;
      --yellow-warn: #ffd600;
      --text-primary: #e8f4ff;
      --text-secondary: #7aa3c8;
      --text-mono: #4fc3f7;
      --border: rgba(61,155,255,0.18);
      --border-bright: rgba(61,155,255,0.5);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'Barlow', sans-serif;
      height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* TOPBAR */
    .topbar {
      z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 60px;
      background: rgba(3,11,20,0.98);
      border-bottom: 1px solid var(--border-bright);
      flex-shrink: 0;
    }
    .topbar-brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon {
      width: 36px; height: 36px;
      background: var(--blue-primary);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px; color: white; font-weight: 700;
      box-shadow: 0 0 20px rgba(13,110,253,0.5);
    }
    .brand-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.5rem; font-weight: 700; letter-spacing: 0.15em;
    }
    .brand-name span { color: var(--blue-accent); }
    .nav-links { display: flex; gap: 0.5rem; }
    .nav-link {
      padding: 6px 14px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem; font-weight: 600; letter-spacing: 0.08em;
      color: var(--text-secondary); text-decoration: none;
      border: 1px solid transparent; border-radius: 4px; transition: all 0.2s;
    }
    .nav-link:hover, .nav-link.active {
      color: var(--blue-accent); border-color: var(--border-bright);
      background: rgba(13,110,253,0.1);
    }
    .topbar-right { display: flex; align-items: center; gap: 1rem; }
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem; color: var(--green-ok);
      border: 1px solid rgba(0,230,118,0.3);
      padding: 4px 10px; border-radius: 20px;
      background: rgba(0,230,118,0.05);
    }
    .status-dot { width:7px; height:7px; border-radius:50%; background:var(--green-ok); animation:blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* LAYOUT */
    .layout {
      display: flex; flex: 1; overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 320px; flex-shrink: 0;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sidebar-head {
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(13,110,253,0.05);
    }
    .sidebar-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-primary);
    }
    .sidebar-title::before { content: '// '; color: var(--blue-accent); }
    .sidebar-body { flex: 1; overflow-y: auto; padding: 0.5rem; }
    .sidebar-body::-webkit-scrollbar { width: 4px; }
    .sidebar-body::-webkit-scrollbar-track { background: transparent; }
    .sidebar-body::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

    /* INCIDENT CARDS */
    .incident-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px; padding: 0.9rem;
      margin-bottom: 0.5rem; cursor: pointer;
      transition: all 0.2s;
    }
    .incident-card:hover { border-color: var(--blue-primary); background: rgba(13,110,253,0.08); }
    .incident-card.active-alert { border-color: rgba(255,59,59,0.4); background: rgba(255,59,59,0.04); }
    .incident-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
    .incident-id {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem; color: var(--text-mono);
    }
    .incident-status {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem; padding: 2px 7px; border-radius: 20px;
    }
    .incident-status.active { background: rgba(255,59,59,0.15); color: var(--red-alert); border: 1px solid rgba(255,59,59,0.4); }
    .incident-status.resolved { background: rgba(0,230,118,0.1); color: var(--green-ok); border: 1px solid rgba(0,230,118,0.3); }
    .incident-loc {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem; font-weight: 600; color: var(--text-primary);
      margin-bottom: 3px;
    }
    .incident-meta {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem; color: var(--text-secondary);
    }
    .incident-meta span { color: var(--blue-accent); }

    /* MAP */
    .map-container { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* MAP OVERLAY */
    .map-overlay {
      position: absolute; top: 1rem; right: 1rem;
      z-index: 999;
      background: rgba(3,11,20,0.92);
      border: 1px solid var(--border-bright);
      border-radius: 8px; padding: 1rem;
      min-width: 200px;
      backdrop-filter: blur(10px);
    }
    .overlay-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-secondary); margin-bottom: 0.8rem;
    }
    .legend-item {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 0.5rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem; color: var(--text-secondary);
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-dot.red { background: var(--red-alert); box-shadow: 0 0 6px var(--red-alert); }
    .legend-dot.green { background: var(--green-ok); }
    .legend-dot.blue { background: var(--blue-bright); box-shadow: 0 0 6px var(--blue-bright); }

    .map-stat {
      margin-top: 0.8rem; padding-top: 0.8rem;
      border-top: 1px solid var(--border);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem; color: var(--text-secondary);
      line-height: 1.8;
    }
    .map-stat span { color: var(--text-mono); float: right; }

    /* Leaflet dark overrides */
    .leaflet-tile { filter: brightness(0.5) saturate(0.6) hue-rotate(185deg); }
    .leaflet-container { background: #030b14; }
    .leaflet-popup-content-wrapper {
      background: var(--bg-panel) !important;
      border: 1px solid var(--border-bright) !important;
      color: var(--text-primary) !important;
      border-radius: 6px !important;
      box-shadow: 0 0 20px rgba(13,110,253,0.3) !important;
    }
    .leaflet-popup-tip { background: var(--bg-panel) !important; }
    .leaflet-popup-content {
      font-family: 'Share Tech Mono', monospace !important;
      font-size: 0.75rem !important;
      line-height: 1.8 !important;
      color: var(--text-primary) !important;
      margin: 10px 14px !important;
    }
    .popup-title {
      font-family: 'Rajdhani', sans-serif !important;
      font-size: 1rem !important; font-weight: 700 !important;
      color: var(--blue-accent) !important; margin-bottom: 6px !important;
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-brand">
    <div class="brand-icon">M</div>
    <div class="brand-name">SENTI<span>NEL</span> MAP</div>
  </div>
  <nav class="nav-links">
    <a href="/dashboard" class="nav-link">Dashboard</a>
    <a href="/sos" class="nav-link">SOS</a>
    <a href="/maps" class="nav-link active">Maps</a>
  </nav>
  <div class="topbar-right">
    <div class="status-pill"><div class="status-dot"></div>LIVE TRACKING</div>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-title">Incident Locations</div>
    </div>
    <div class="sidebar-body" id="incident-list">
      <div style="padding:2rem;text-align:center;color:var(--text-secondary);font-family:'Share Tech Mono',monospace;font-size:0.75rem;">
        LOADING...
      </div>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-container">
    <div id="map"></div>

    <!-- OVERLAY -->
    <div class="map-overlay">
      <div class="overlay-title">Map Legend</div>
      <div class="legend-item"><div class="legend-dot red"></div>Active Alert</div>
      <div class="legend-item"><div class="legend-dot green"></div>Resolved</div>
      <div class="legend-item"><div class="legend-dot blue"></div>ARD Device</div>
      <div class="map-stat">
        INCIDENTS <span id="stat-total">—</span><br>
        ACTIVE <span id="stat-active" style="color:var(--red-alert)">—</span><br>
        RESOLVED <span id="stat-resolved" style="color:var(--green-ok)">—</span>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // Map centered on NIT Hamirpur
  const map = L.map('map', { zoomControl: false }).setView([31.7082, 76.5270], 15);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  L.control.zoom({ position: 'bottomright' }).addTo(map);

  // Custom markers
  function makeIcon(color) {
    return L.divIcon({
      className: '',
      html: `<div style="
        width:14px;height:14px;border-radius:50%;
        background:${color};
        border:2px solid rgba(255,255,255,0.5);
        box-shadow:0 0 12px ${color};
      "></div>`,
      iconSize: [14, 14], iconAnchor: [7, 7]
    });
  }

  // ARD Device markers (static)
  const devices = [
    { id:'ARD-001', loc:'NIT Hamirpur Library', lat:31.7082, lng:76.5270 },
    { id:'ARD-002', loc:'NIT Hamirpur Gate', lat:31.7095, lng:76.5255 },
    { id:'ARD-003', loc:'Main Road', lat:31.7101, lng:76.5265 },
    { id:'ARD-004', loc:'Hostel Block A', lat:31.7072, lng:76.5280 },
  ];

  devices.forEach(d => {
    L.marker([d.lat, d.lng], { icon: makeIcon('#3d9bff') })
      .addTo(map)
      .bindPopup(`<div class="popup-title">${d.id}</div><div style="color:#7aa3c8">${d.loc}</div><div style="color:#00e676;margin-top:4px">● ONLINE</div>`);
  });

  let markers = [];

  async function loadMap() {
    try {
      const res = await fetch('/api/emergencies');
      const data = await res.json();

      // Clear old markers
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      // Stats
      const active = data.filter(a => a.status==='Active').length;
      const resolved = data.filter(a => a.status==='Resolved').length;
      document.getElementById('stat-total').textContent = data.length;
      document.getElementById('stat-active').textContent = active;
      document.getElementById('stat-resolved').textContent = resolved;

      // Incident list
      const list = document.getElementById('incident-list');
      if (data.length === 0) {
        list.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-secondary);font-family:\'Share Tech Mono\',monospace;font-size:0.75rem;">NO INCIDENTS</div>';
      } else {
        list.innerHTML = data.map((a, i) => `
          <div class="incident-card ${a.status==='Active'?'active-alert':''}" onclick="focusIncident(${i})">
            <div class="incident-header">
              <div class="incident-id">${a.device||'UNK'} · #${a.id||i}</div>
              <div class="incident-status ${a.status==='Active'?'active':'resolved'}">${a.status||'N/A'}</div>
            </div>
            <div class="incident-loc">${a.location||'Unknown'}</div>
            <div class="incident-meta"><span>${a.timestamp||''}</span> | ${a.type||''}</div>
          </div>
        `).join('');
      }

      // Plot markers
      data.forEach((a, i) => {
        if (!a.coords) return;
        const parts = a.coords.split(',');
        if (parts.length < 2) return;
        const lat = parseFloat(parts[0]);
        const lng = parseFloat(parts[1]);
        if (isNaN(lat)||isNaN(lng)) return;
        const color = a.status==='Active' ? '#ff3b3b' : '#00e676';
        const m = L.marker([lat, lng], { icon: makeIcon(color) })
          .addTo(map)
          .bindPopup(`
            <div class="popup-title">${a.location||'Unknown'}</div>
            <div>Device: <span style="color:#4fc3f7">${a.device||'N/A'}</span></div>
            <div>Type: ${a.type||'N/A'}</div>
            <div>Time: ${a.timestamp||'N/A'}</div>
            <div>Status: <span style="color:${color}">${a.status}</span></div>
          `);
        markers.push(m);
        window['incident_'+i] = { lat, lng, marker: m };
      });

    } catch(e) { console.error(e); }
  }

  function focusIncident(i) {
    const inc = window['incident_'+i];
    if (inc) {
      map.setView([inc.lat, inc.lng], 17);
      inc.marker.openPopup();
    }
  }

  loadMap();
  setInterval(loadMap, 6000);
</script>
</body>
</html>
